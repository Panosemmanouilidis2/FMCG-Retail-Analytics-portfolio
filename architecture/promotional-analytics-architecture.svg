<svg width="100%" viewBox="0 0 680 552" xmlns="http://www.w3.org/2000/svg">
<title>Promotional Analytics ML Pipeline Architecture</title>
<desc>End-to-end pipeline from raw sell-out data through XGBoost model training for two markets, deployed to Vertex AI endpoints and served via Streamlit on Cloud Run</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  .box-blue { fill: #E6F1FB; stroke: #185FA5; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; }
  .box-coral { fill: #FAECE7; stroke: #993C1D; }
  .title-blue { fill: #0C447C; font-family: Georgia, serif; font-size: 14px; font-weight: 600; }
  .title-teal { fill: #085041; font-family: Georgia, serif; font-size: 14px; font-weight: 600; }
  .title-purple { fill: #3C3489; font-family: Georgia, serif; font-size: 14px; font-weight: 600; }
  .title-amber { fill: #633806; font-family: Georgia, serif; font-size: 14px; font-weight: 600; }
  .title-coral { fill: #712B13; font-family: Georgia, serif; font-size: 14px; font-weight: 600; }
  .sub-blue { fill: #185FA5; font-family: Georgia, serif; font-size: 12px; }
  .sub-teal { fill: #0F6E56; font-family: Georgia, serif; font-size: 12px; }
  .sub-purple { fill: #534AB7; font-family: Georgia, serif; font-size: 12px; }
  .sub-amber { fill: #854F0B; font-family: Georgia, serif; font-size: 12px; }
  .sub-coral { fill: #993C1D; font-family: Georgia, serif; font-size: 12px; }
  .arrow-line { fill: none; stroke: #888780; stroke-width: 1.5; }
</style>
</defs>

<!-- Box 1: Raw sell-out data -->
<rect x="180" y="40" width="320" height="52" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="title-blue" x="340" y="58" text-anchor="middle" dominant-baseline="central">Raw sell-out data</text>
<text class="sub-blue" x="340" y="76" text-anchor="middle" dominant-baseline="central">640K+ promotional events · 2 markets</text>

<!-- Arrow 1 -->
<line x1="340" y1="92" x2="340" y2="138" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Box 2: Data cleaning & FE -->
<rect x="180" y="140" width="320" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="title-teal" x="340" y="158" text-anchor="middle" dominant-baseline="central">Data cleaning &amp; feature engineering</text>
<text class="sub-teal" x="340" y="176" text-anchor="middle" dominant-baseline="central">15+ derived features · leakage-controlled</text>

<!-- Split arrows -->
<path d="M 340 192 L 340 218 L 195 218 L 195 250" class="arrow-line" marker-end="url(#arrow)"/>
<path d="M 340 192 L 340 218 L 485 218 L 485 250" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Box 3a: Western Europe -->
<rect x="80" y="250" width="230" height="52" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="title-purple" x="195" y="268" text-anchor="middle" dominant-baseline="central">Western Europe model</text>
<text class="sub-purple" x="195" y="286" text-anchor="middle" dominant-baseline="central">XGBoost · R² 0.81</text>

<!-- Box 3b: Southeast Asia -->
<rect x="370" y="250" width="230" height="52" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="title-purple" x="485" y="268" text-anchor="middle" dominant-baseline="central">Southeast Asia model</text>
<text class="sub-purple" x="485" y="286" text-anchor="middle" dominant-baseline="central">XGBoost · R² 0.70</text>

<!-- Merge arrows -->
<path d="M 195 302 L 195 338 L 330 338 L 330 360" class="arrow-line" marker-end="url(#arrow)"/>
<path d="M 485 302 L 485 338 L 350 338 L 350 360" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Box 4: Vertex AI -->
<rect x="180" y="360" width="320" height="52" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="title-amber" x="340" y="378" text-anchor="middle" dominant-baseline="central">Vertex AI model registry</text>
<text class="sub-amber" x="340" y="396" text-anchor="middle" dominant-baseline="central">Live endpoints · REST API</text>

<!-- Arrow 4 -->
<line x1="340" y1="412" x2="340" y2="458" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Box 5: Cloud Run + Streamlit -->
<rect x="180" y="460" width="320" height="52" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="title-coral" x="340" y="478" text-anchor="middle" dominant-baseline="central">Cloud Run · Streamlit</text>
<text class="sub-coral" x="340" y="496" text-anchor="middle" dominant-baseline="central">Planner-facing forecast interface</text>
</svg>
