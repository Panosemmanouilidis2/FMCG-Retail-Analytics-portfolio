<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555" />
    </marker>
  </defs>

  <!-- Raw sell-out data -->
  <rect x="150" y="10" width="200" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="35" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Raw sell-out data</text>
  <text x="250" y="53" text-anchor="middle" fill="#cce0ff" font-size="10">Large-scale promotional data · 2 markets</text>

  <line x1="250" y1="70" x2="250" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data cleaning -->
  <rect x="100" y="100" width="300" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="125" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Data cleaning &amp; feature engineering</text>
  <text x="250" y="143" text-anchor="middle" fill="#cce0ff" font-size="10">15+ derived features · leakage-controlled</text>

  <line x1="190" y1="160" x2="140" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="310" y1="160" x2="360" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Market A -->
  <rect x="40" y="200" width="190" height="60" rx="8" fill="#0d47a1" />
  <text x="135" y="225" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Market A model</text>
  <text x="135" y="243" text-anchor="middle" fill="#cce0ff" font-size="10">XGBoost · R² 0.81</text>

  <!-- Market B -->
  <rect x="270" y="200" width="190" height="60" rx="8" fill="#0d47a1" />
  <text x="365" y="225" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Market B model</text>
  <text x="365" y="243" text-anchor="middle" fill="#cce0ff" font-size="10">XGBoost · R² 0.70</text>

  <line x1="135" y1="260" x2="215" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="365" y1="260" x2="285" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vertex AI -->
  <rect x="120" y="310" width="260" height="60" rx="8" fill="#1565c0" />
  <text x="250" y="335" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Vertex AI model registry</text>
  <text x="250" y="353" text-anchor="middle" fill="#cce0ff" font-size="10">Live endpoints · REST API</text>

  <line x1="250" y1="370" x2="250" y2="410" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cloud Run -->
  <rect x="130" y="410" width="240" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="435" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Cloud Run · Streamlit</text>
  <text x="250" y="453" text-anchor="middle" fill="#cce0ff" font-size="10">Planner-facing forecast interface</text>

</svg>
