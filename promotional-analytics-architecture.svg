<svg viewBox="0 0 500 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555" />
    </marker>
  </defs>

  <!-- Raw sell-out data -->
  <rect x="150" y="20" width="200" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="45" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Raw sell-out data</text>
  <text x="250" y="63" text-anchor="middle" fill="#cce0ff" font-size="10">Large-scale promotional data · 2 markets</text>

  <!-- Arrow -->
  <line x1="250" y1="80" x2="250" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data cleaning & feature engineering -->
  <rect x="100" y="110" width="300" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="135" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Data cleaning &amp; feature engineering</text>
  <text x="250" y="153" text-anchor="middle" fill="#cce0ff" font-size="10">15+ derived features · leakage-controlled</text>

  <!-- Arrows splitting -->
  <line x1="190" y1="170" x2="140" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="310" y1="170" x2="360" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Market A model -->
  <rect x="40" y="210" width="190" height="60" rx="8" fill="#0d47a1" />
  <text x="135" y="235" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Market A model</text>
  <text x="135" y="253" text-anchor="middle" fill="#cce0ff" font-size="10">XGBoost · R² 0.81</text>

  <!-- Market B model -->
  <rect x="270" y="210" width="190" height="60" rx="8" fill="#0d47a1" />
  <text x="365" y="235" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Market B model</text>
  <text x="365" y="253" text-anchor="middle" fill="#cce0ff" font-size="10">XGBoost · R² 0.70</text>

  <!-- Arrows merging -->
  <line x1="135" y1="270" x2="215" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="365" y1="270" x2="285" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vertex AI model registry -->
  <rect x="120" y="320" width="260" height="60" rx="8" fill="#1565c0" />
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Vertex AI model registry</text>
  <text x="250" y="363" text-anchor="middle" fill="#cce0ff" font-size="10">Live endpoints · REST API</text>

  <!-- Arrow -->
  <line x1="250" y1="380" x2="250" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cloud Run - Streamlit -->
  <rect x="130" y="420" width="240" height="60" rx="8" fill="#1a73e8" />
  <text x="250" y="445" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Cloud Run · Streamlit</text>
  <text x="250" y="463" text-anchor="middle" fill="#cce0ff" font-size="10">Planner-facing forecast interface</text>

</svg>
